      doc_changes: "CommitOutcome gate (flow + Must-not + AC-7 + eval 19); streaming content_hash (fingerprint note + Must-not + eval 20); append_untracked allow-list filter (Phase 2 + diff.rs row + Must-not + eval 21 + gather_for_files API); unborn scoping note; partial-staging accepted-tradeoff note; eval table now 21 rows, ACs now 7."
