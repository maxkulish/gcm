# Scope checklist (from the Linear task)
scope:
  - "Per-repo cache keyed by sha256(repo-root), OS-appropriate location, 0600 perms"
  - "Content-fingerprint freshness over pending files only, re-stamped on advance; unborn-branch safe; no naive HEAD pin"
  - "Advance on commit success (drop the committed group); supply the next group's message per the contract"
  - "On git commit failure (e.g. rejecting pre-commit hook): do not advance, leave files staged, surface the error"
  - "--reset clears the cache; --all / fallback clear it"

acceptance_criteria:
  - "Commit group 1, re-run, group 2 commits from cache with no new analysis call and a valid message"
  - "Editing a pending file before the next run invalidates the cache and re-analyzes"
  - "A failing pre-commit hook leaves the plan un-advanced and the group still staged"
  - "The first commit in a brand-new repo (no HEAD) works"

