      applied:
        - "P1 cache-advance-on-abort: commit_group_flow returns Ok(()) for BOTH commit success AND Decision::Abort (main.rs:140-153); --dry-run also Ok. Gating advance on a bare Ok would drop group 0 on abort -> permanent skip. Fix: CommitOutcome { Committed, Aborted }; advance gated on Committed. VERIFIED. -> Detailed design flow + Must-not + AC-7 + eval 19 + main.rs row."
        - "P2 content_hash OOM: naive fs::read loads whole pending files -> OOM on a large binary still in git status. Fix: stream via BufReader + io::copy into Sha256 (constant memory). Matches diff.rs read_capped invariant ('never load a huge file fully'). Fingerprint hashes FULL content (streaming, not capping - a change past 8KB must flip it). VERIFIED. -> fingerprint note + Must-not + eval 20."
        - "P3 untracked hallucination in gather_for_files: append_untracked (diff.rs:100-101) appends EVERY repo untracked file, unfiltered; reused for one group it pollutes group 0's message prompt. Fix: refactor append_untracked to take an allow-list; gather_for_files passes the group's paths. VERIFIED. -> Phase 2 + diff.rs row + Must-not + eval 21."
        - "P4 unborn message-gen: on unborn, tracked diff is empty so group 0 content is 100% untracked -> reinforces P3's filter. REFINED the reviewer's framing: the message-only call never fires while STILL unborn (committing group 0 creates HEAD before any advanced-group cache hit), so the concern lands on gather_for_files correctness (eval 18), not the live message path. VERIFIED + scoped. -> Phase 2 unborn note."
        - "P5 partial-staging loss on commit failure: clear_staged (read-tree HEAD) wipes the user's manual index selection before staging group 0; skipping restore (FR-58) leaves only group 0 staged. VERIFIED. Resolution = acknowledge as accepted tradeoff (loses INDEX SELECTION only, never working-tree changes; main already does this on success; already disclosed in cli.rs EGRESS_DISCLOSURE for git add -p). Not a code fix. -> failure-semantics 'Accepted tradeoff' note."
