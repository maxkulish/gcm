      - "Pt5 (empty models=[] = unrestricted): kept (migration requires it); documented trade-off + Option<Vec> alternative considered-and-rejected (degenerate 0-enabled state)."
      - "Doc fix found while validating: Gemini auth is x-goog-api-key HEADER at /v1beta/models (not ?key= query) - corrected the endpoints table to match gemini.rs."
    owner_review_round2:
      # 17-point implementation-level review; validated each vs code, applied HIGH, deferred low/middle per owner instruction
      - "HIGH pt1 (data loss): D8 merge_provider_config - wizard updates ONE provider, preserves others, sets default. Verified save() overwrites whole file via write_atomic."
      - "HIGH pt2 (data loss): gcm config/run_wizard must preserve existing per-provider models when rebuilding (else reconfigure erases the whitelist). Verified run_wizard builds fresh + save overwrites."
      - "HIGH pt3: explicit credential step BEFORE fetch (env > inline config > cliclack::password > skip->fallback); never echo; persist only on completion. Reverses round-1 read-only decision (owner-requested)."
      - "HIGH pt9 (correctness): migration version-write trap - migrate stamps cfg.version=CONFIG_FORMAT_VERSION AND render_config forces v2; sample/non-tty templates ->v2. Verified render_config serializes config.version directly."
      - "HIGH pt17 (false-rejection): enforcement compares after per-provider canonicalization (Gemini strip models/, Ollama :latest, trim; no case-fold)."
      - "pt10: fetch_supported_models returns ModelFetchOutcome{models,source,warning} (needed to realize the D7.2 notice)."
      - "pt13: enforcement-on-clean-repo is intentional (mirrors onboarding pre-check) + covered by a test."
      - "pt16: cancel/Esc/Ctrl-C -> outro_cancel + non-zero, no partial write, config untouched (Must-not)."
      - "pt15: cliclack/console default-features=false (Goose-style, lean posture) + cargo tree check."
      - "pt5: corrected filter caveat - cliclack 0.5 .filter_mode() is jaro_winkler+containment fuzzy-ish, not plain substring (owner inspected the crate)."
      - "Already fixed round 1 (skipped): pt6 chat-only filter (D7.1), pt7 pagination (D7.4), pt8 baseline merge (D7.3), Gemini x-goog-api-key header."
    deferred_middle:
      - "pt4 .max_rows(~20) on multiselect (cheap at impl)"
      - "pt11 concrete fast-fetch transport (3-5s timeout, 0-1 retries)"
      - "pt12 gcm status whitelist awareness (out of scope, follow-up)"
