      - "Pt3 (no-key short-circuit, D7.2): gcm provider READS keys (env/config), does not capture; no key -> skip fetch + explicit notice. Fixed an internal D5 inconsistency (had implied key capture)."
      - "Pt4 (baseline merge, D7.3): merge fetched ∪ static_fallback ∪ {current default, current enabled}, dedupe, so .initial_value() always resolves even if live list omits the default."
      - "Pt6 (pagination, D7.4): Gemini (nextPageToken) + Anthropic (has_more/last_id) paginate, OpenAI/Groq don't; v1 requests large first page (pageSize=1000/limit=1000), >1000 truncation noted as known limitation."
