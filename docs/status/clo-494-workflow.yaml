      - confidence: high
        text: >-
          tool_choice:{type:"tool",name:"commit_plan"} forces the model to call the tool on every request, never
          producing a plain-text refusal or end_turn without a tool call.
        verification: 'Integration test: gcm --provider=anthropic --dry-run on sample diff'
      - confidence: medium
        text: 'The anthropic-version: 2023-06-01 header value is stable and required for all Messages API calls.'
