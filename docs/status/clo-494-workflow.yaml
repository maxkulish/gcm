      - confidence: medium
        text: The default model claude-haiku-4-5 is a valid Anthropic model ID accepted by the Messages API.
        verification: Integration test; if wrong, API returns HTTP 400 with model-not-found
      - confidence: high
        text: 'max_tokens: 4096 is sufficient for the grouping plan response (plan JSON is typically 200-2000 tokens).'
        verification: Integration test with 20+ file diff; if truncated, stop_reason:max_tokens surfaces as Deserialize error
      - confidence: high
        text: >-
          The existing HttpRequest struct can be extended with extra_headers without breaking the retry/backoff engine
