# Scope checklist (from the Linear task)
scope:
  - "Cargo scaffold + Rust .gitignore (replace Go-flavored one) + --version stamping + distinct exit codes (0 ok/abort, 1 error, 2 usage)"
  - "Git checks: in-repo, has-changes-else-exit-0"
  - "Gather diff with binary-file elision + --exclude-standard untracked inclusion, bounded by file-count/byte cap"
  - "Direct Groq HTTP call for one conventional-commit message (key from GROQ_API_KEY)"
  - "[Y/n/e] confirm with $EDITOR; restore index to pre-run state on abort"
  - "git commit -S (signed)"
  - "--help / README disclose that the diff is sent to the provider"

acceptance_criteria:
  - "In a dirty repo (incl. a binary file and a unicode-named file) gcm produces one real signed commit with an AI message"
  - "Aborting at the prompt leaves the index exactly as it was before the run"
  - "A gitignored .env is never included in the request"
  - "An un-ignored directory of thousands of files does not freeze the CLI (the cap engages)"

