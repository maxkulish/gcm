      - confidence: high
        text: >-
          Honoring the discovery-chosen TOML format requires adding the toml crate; serde + serde_json cannot parse
          TOML.
        verification: Cargo.toml lists no toml dependency. See Open question 1.
      - confidence: high
        text: >-
          Echo suppression via stty -echo / stty echo works on the supported platforms because the codebase already
          shells out to sh for the editor.
        verification: The platform comment and Command::new("sh") pattern in src/ui.rs::edit_in_editor.
      - confidence: medium
        text: >-
          std::env::set_var is sound for the env-hydration bridge: the crate is edition 2021 and hydration runs once at
          startup, before any provider call or thread spawn.
        verification: >-
          Cargo.toml edition = 2021. If the crate moves to edition 2024, set_var becomes unsafe and this bridge must be
          wrapped.
      - confidence: high
        text: >-
          Clap accepts an optional #[command(subcommand)] Option<Commands> alongside the existing top-level flags, so
          gcm with no subcommand still runs the commit flow.
        verification: cargo build + a no-args parse test.
      - confidence: medium
        text: >-
          Storing an inline key in a 0600 file satisfies the team's security bar for v1 (PRD permits 0600 or env-only).
          Tension with ADR-001 Decision 4 which says keys are referenced by env-var name, never stored as plaintext.
        verification: PRD requirement 10; wizard defaults to env-only. See Open question 6.
      - confidence: high
        text: >-
          In --json mode, the onboarding-required early exit must emit a JSON error envelope on stdout, not prompt text;
          all interactive prompts and human-facing diagnostics go to stderr.
        verification: >-
          Existing output::error envelope pattern; add a --json non-TTY first-run integration test. Per
          .pi/lessons/clo-493-... § L1.
