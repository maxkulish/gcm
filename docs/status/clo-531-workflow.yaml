      - confidence: high
        text: >-
          git checkout --conflict=zdiff3 re-materializes conflict markers for all unmerged paths without losing the
          merge state.
        verification: Integration test in a real temp repo with a conflicted merge.
      - confidence: high
        text: mergiraf is an optional external tool; its absence degrades gracefully to the pure-LLM path.
        verification: Acceptance test with mergiraf absent (uninstalled).
      - confidence: medium
        text: >-
          mergiraf exits 0 when it fully resolves a file and non-zero when hunks remain; residual markers are detected
          by re-parsing.
        verification: 'Design-phase debt: verify exact mergiraf CLI semantics; documented in discovery debt.'
      - confidence: high
        text: The existing Provider trait can accommodate a new resolve_hunks method without breaking existing backends.
        verification: Each backend adds its own structured-output shape; existing methods unchanged.
      - confidence: high
        text: zdiff3 markers always include a ||||||| base block (unlike plain diff3 which omits it).
        verification: Verified against git docs and the existing is_merging() integration test.
      - confidence: high
        text: >-
          The --json stdout discipline (stderr for human prose, stdout for JSON only) applies to gcm resolve the same as
          the commit flow.
        verification: Lesson clo-493 §L1; enforced by acceptance test.
      - confidence: high
        text: >-
          --secret-scan and .gcmignore filtering apply to hunk text sent to the provider the same way they apply to diff
          text.
        verification: Lesson clo-514 §L1/L2; reuse existing Privacy API.
      - confidence: high
        text: Provider HTTP timeouts for the resolve path should not preempt the outer resolve-command timeout.
        verification: Lesson timeout-layering §L1; reuse existing http::post_json retry/backoff.
      - confidence: medium
        text: >-
          The default syntax-safe validation (no conflict markers in output) is sufficient to catch most LLM
          hallucinations.
        verification: Acceptance test with deliberately malformed LLM output.
      - confidence: medium
        text: >-
          A temperature of 0.1 is low enough for reproducible conflict resolution and high enough to avoid degenerate
          outputs.
        verification: Manual testing across providers during implementation.
