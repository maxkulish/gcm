# Scope checklist (from the Linear task)
scope:
  - "Full plan validation: no omitted files, no file in more than one group, no empty groups, message placement per contract"
  - "Single-commit fallback only after retries (CLO-488); warn why grouping failed"
  - "Stage only after the user confirms the lumped commit; restore the pre-run index on decline/failure"
  - "Warn before resetting a user-curated (partially staged) index"

acceptance_criteria:
  - "A plan that omits a changed file or duplicates one is rejected to fallback, not committed"
  - "On a forced grouping failure, declining the fallback leaves the index exactly as before the run"
  - "Running with pre-staged hunks warns before the index is reset"

